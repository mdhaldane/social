<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Haldane | Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #101015;
      color: #E8E3D3;
      font-family: "IBM Plex Mono", "Courier New", Courier, "Lucida Console", Monaco, monospace;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      padding-bottom: 60px;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .masthead {
      border-bottom: 1px solid #1c1c24;
      margin-bottom: 40px;
      padding: 30px 0;
    }

    .masthead-inner {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-title {
      color: #D4C5B0;
      font-size: 1.25rem;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .site-title:hover {
      color: #dfd4c4;
    }

    .site-subtitle {
      color: #8c8578;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 60px;
      border-top: 1px solid #1c1c24;
      padding-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #8c8578;
    }

    .footer a {
      color: #D4C5B0;
      text-decoration: none;
    }

    .footer a:hover {
      color: #dfd4c4;
      text-decoration: underline;
    }

    /* Custom Scrollbar for a premium look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #101015;
    }
    ::-webkit-scrollbar-thumb {
      background: #1c1c24;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #D4C5B0;
    }
  </style>
</head>
<body>

<div class="container">
  <header class="masthead">
    <div class="masthead-inner">
      <a href="https://matthaldane.com" class="site-title">Matt Haldane</a>
      <span class="site-subtitle">/ social</span>
    </div>
  </header>

  <main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/bsky-embed/dist/bsky-embed.es.js" async></script>

    <bsky-embed
      username="social.matthaldane.com"
      limit="5"
      mode="dark"
      link-target="_blank"
      link-image="true"
      load-more="true"
      disable-styles="false"
      custom-styles="
        * {
          font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace !important;
        }
        :host, 
        .bg-white, 
        .bg-slate-50, 
        .bg-slate-100, 
        .bg-slate-200, 
        .bg-slate-900, 
        .dark\:bg-slate-900, 
        .dark\:bg-slate-800 {
          background-color: #101015 !important;
        }
        .text-slate-900, 
        .dark\:text-white, 
        p, 
        div, 
        span, 
        time {
          color: #E8E3D3 !important;
        }
        .text-slate-500, 
        .text-slate-600, 
        .dark\:text-slate-400, 
        .text-sm {
          color: #8c8578 !important;
        }
        a, 
        .text-blue-500, 
        .font-bold, 
        .font-semibold {
          color: #D4C5B0 !important;
        }
        a:hover, 
        .hover\:underline:hover {
          color: #dfd4c4 !important;
          text-decoration: underline !important;
        }
        .border, 
        .border-b, 
        .border-slate-300, 
        .dark\:border-slate-800, 
        hr {
          border-color: #1c1c24 !important;
        }
        img {
          border-radius: 4px !important;
          border: 1px solid #1c1c24 !important;
        }
        svg {
          color: #8c8578 !important;
          fill: currentColor !important;
        }
        a:hover svg {
          color: #D4C5B0 !important;
        }
        button, 
        .bg-blue-500, 
        .hover\:bg-blue-700 {
          background-color: #1a1a24 !important;
          color: #D4C5B0 !important;
          border: 1px solid #D4C5B0 !important;
          border-radius: 4px !important;
          padding: 8px 16px !important;
          font-weight: 600 !important;
          transition: all 0.2s ease-in-out !important;
        }
        button:hover, 
        .hover\:bg-blue-700:hover {
          background-color: #D4C5B0 !important;
          color: #101015 !important;
          border-color: #D4C5B0 !important;
        }
      "
      date-format='{"type":"absolute","locale":"en-US","options":{"weekday":"long","year":"numeric","month":"long","day":"numeric"}}'
    >
    </bsky-embed>
  </main>

  <footer class="footer">
    <p>Return to <a href="https://matthaldane.com">matthaldane.com</a></p>
  </footer>
</div>

</body>
</html>
