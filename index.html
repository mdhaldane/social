<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Haldane | Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #101015;
      color: #E8E3D3;
      font-family: "IBM Plex Mono", "Courier New", Courier, "Lucida Console", Monaco, monospace;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      padding-bottom: 60px;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .masthead {
      border-bottom: 1px solid #1c1c24;
      margin-bottom: 40px;
      padding: 30px 0;
    }

    .masthead-inner {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-title {
      color: #D4C5B0;
      font-size: 1.25rem;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .site-title:hover {
      color: #dfd4c4;
    }

    .site-subtitle {
      color: #8c8578;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 60px;
      border-top: 1px solid #1c1c24;
      padding-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #8c8578;
    }

    .footer a {
      color: #D4C5B0;
      text-decoration: none;
    }

    .footer a:hover {
      color: #dfd4c4;
      text-decoration: underline;
    }

    /* Lightbox Modal Styles */
    .lightbox-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(16, 16, 21, 0.95);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .lightbox-modal.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lightbox-image {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border: 1px solid #1c1c24;
      border-radius: 4px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transform: scale(0.97);
      transition: transform 0.2s ease;
    }

    .lightbox-modal.active .lightbox-image {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: #1a1a24;
      color: #D4C5B0;
      border: 1px solid #D4C5B0;
      padding: 4px 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .lightbox-close:hover {
      background: #D4C5B0;
      color: #101015;
    }

    .lightbox-caption {
      margin-top: 15px;
      color: #8c8578;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.8rem;
      text-align: center;
    }

    /* Custom Scrollbar for a premium look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #101015;
    }
    ::-webkit-scrollbar-thumb {
      background: #1c1c24;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #D4C5B0;
    }
  </style>
</head>
<body>

<div class="container">
  <header class="masthead">
    <div class="masthead-inner">
      <a href="https://matthaldane.com" class="site-title">Matt Haldane</a>
      <span class="site-subtitle">/ social</span>
    </div>
  </header>

  <main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/bsky-embed/dist/bsky-embed.es.js" async></script>

    <bsky-embed
      username="social.matthaldane.com"
      limit="5"
      mode="dark"
      link-target="_blank"
      link-image="true"
      load-more="true"
      disable-styles="false"
      custom-styles="
        * {
          font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace !important;
        }
        /* 1. Hide avatar column links by class or content */
        a.w-10, 
        a.h-10, 
        a.rounded-full, 
        a:has(img:not([src*='feed_thumbnail']):not([src*='feed_fullsize'])) {
          display: none !important;
        }
        /* 2. Hide avatar images directly if they aren't post photos */
        img:not([src*='feed_thumbnail']):not([src*='feed_fullsize']) {
          display: none !important;
        }
        /* 3. Remove left margin offset where avatar column used to be */
        .ml-10 {
          margin-left: 0 !important;
        }
        /* 4. Remove horizontal padding to align content flush with horizontal rules */
        .p-4, 
        .px-4, 
        .p-3 {
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        /* 5. Reset max-width restrictions on the post body container */
        .flex-1, 
        .flex > div:nth-child(2),
        div.flex > div[class*='min-w-0'],
        div[class*='max-w-\[calc'] {
          max-width: 100% !important;
          width: 100% !important;
          flex: 1 1 0% !important;
        }
        :host, 
        .bg-white, 
        .bg-slate-50, 
        .bg-slate-100, 
        .bg-slate-200, 
        .bg-slate-900, 
        .dark\:bg-slate-900, 
        .dark\:bg-slate-800 {
          background-color: #101015 !important;
        }
        .text-slate-900, 
        .dark\:text-white, 
        p, 
        div, 
        span, 
        time {
          color: #E8E3D3 !important;
        }
        .text-slate-500, 
        .text-slate-600, 
        .dark\:text-slate-400, 
        .text-sm {
          color: #8c8578 !important;
        }
        a, 
        .text-blue-500, 
        .font-bold, 
        .font-semibold {
          color: #D4C5B0 !important;
        }
        a:hover, 
        .hover\:underline:hover {
          color: #dfd4c4 !important;
          text-decoration: underline !important;
        }
        .border, 
        .border-b, 
        .border-slate-300, 
        .dark\:border-slate-800, 
        hr {
          border-color: #1c1c24 !important;
        }
        img {
          border-radius: 4px !important;
          border: 1px solid #1c1c24 !important;
        }
        img[src*='feed_thumbnail'], 
        img[src*='feed_fullsize'] {
          cursor: zoom-in !important;
        }
        svg {
          color: #8c8578 !important;
          fill: currentColor !important;
        }
        a:hover svg {
          color: #D4C5B0 !important;
        }
        button, 
        .bg-blue-500, 
        .hover\:bg-blue-700 {
          background-color: #1a1a24 !important;
          color: #D4C5B0 !important;
          border: 1px solid #D4C5B0 !important;
          border-radius: 4px !important;
          padding: 8px 16px !important;
          font-weight: 600 !important;
          transition: all 0.2s ease-in-out !important;
        }
        button:hover, 
        .hover\:bg-blue-700:hover {
          background-color: #D4C5B0 !important;
          color: #101015 !important;
          border-color: #D4C5B0 !important;
        }
      "
      date-format='{"type":"absolute","locale":"en-US","options":{"weekday":"long","year":"numeric","month":"long","day":"numeric"}}'
    >
    </bsky-embed>
  </main>

  <footer class="footer">
    <p>Return to <a href="https://matthaldane.com">matthaldane.com</a></p>
  </footer>
</div>

<script>
  (function() {
    // Create and append lightbox HTML elements
    const lightbox = document.createElement('div');
    lightbox.className = 'lightbox-modal';
    lightbox.innerHTML = `
      <div class="lightbox-content">
        <button class="lightbox-close" aria-label="Close lightbox">[X] CLOSE</button>
        <img class="lightbox-image" src="" alt="Full size image preview">
        <div class="lightbox-caption">ESC TO CLOSE</div>
      </div>
    `;
    document.body.appendChild(lightbox);

    const lightboxImg = lightbox.querySelector('.lightbox-image');
    const closeBtn = lightbox.querySelector('.lightbox-close');

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; // Lock background scrolling
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { lightboxImg.src = ''; }, 200); // Clear image src once animation finishes
    }

    // Event listeners to close the lightbox
    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });

    // Delegate and intercept clicks from the Shadow DOM inside the web component
    const embedElement = document.querySelector('bsky-embed');
    if (embedElement) {
      // Function to strip avatar elements completely from the DOM
      const stripAvatars = (root) => {
        if (!root) return;
        const imgs = root.querySelectorAll('img');
        imgs.forEach(img => {
          const src = img.src || img.getAttribute('src') || '';
          
          // An image is an avatar if it doesn't have feed_thumbnail or feed_fullsize
          const isPostImage = src.includes('feed_thumbnail') || src.includes('feed_fullsize');
          if (!isPostImage && src) {
            img.removeAttribute('src'); // Prevent browser from downloading the image
            
            // Navigate up to find and remove the avatar link container
            const link = img.closest('a');
            if (link) {
              link.remove();
            } else {
              img.remove();
            }
          }
        });
      };

      // Set up observer to capture and strip avatars dynamically as they render
      const observer = new MutationObserver(() => {
        stripAvatars(embedElement.shadowRoot);
      });

      const startObserving = () => {
        if (embedElement.shadowRoot) {
          stripAvatars(embedElement.shadowRoot);
          observer.observe(embedElement.shadowRoot, { childList: true, subtree: true });
        } else {
          setTimeout(startObserving, 10); // Poll fast to catch first paint
        }
      };
      startObserving();

      embedElement.addEventListener('click', (event) => {
        const path = event.composedPath();
        const img = path.find(el => el.tagName === 'IMG');
        
        // Only target post images (URLs containing feed_thumbnail or feed_fullsize) and ignore avatars/etc
        if (img && (img.src.includes('/feed_thumbnail/') || img.src.includes('/feed_fullsize/'))) {
          event.preventDefault();
          event.stopPropagation();
          
          // Switch to high-resolution version
          const fullSizeUrl = img.src.replace('/feed_thumbnail/', '/feed_fullsize/');
          openLightbox(fullSizeUrl);
        }
      });
    }
  })();
</script>

</body>
</html>
